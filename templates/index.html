<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} | {{ subtitle }}</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=Fraunces:opsz,wght@9..144,400;9..144,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/design-system.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/map.css') }}">
</head>
<body>
    <div class="map-page">
        <!-- Map with clickable hotspots -->
        <div class="map-container">
            <div class="map-wrapper">
                <div class="map-image-container">
                    <img src="/map-image/mapa_biomas.png" alt="Brazilian Biomes Map" draggable="false">

                    {% for bioma_id, bioma in biomas.items() %}
                    <a href="{% if bioma.disponivel %}{{ base_url }}/bioma/{{ bioma_id }}{% else %}#{% endif %}"
                       class="map-hotspot {% if not bioma.disponivel %}disabled{% endif %}"
                       data-biome="{{ bioma_id }}"
                       style="left: {{ bioma.hotspot_x }}%; top: {{ bioma.hotspot_y }}%; width: {{ bioma.hotspot_w }}%; height: {{ bioma.hotspot_h }}%;"
                       {% if not bioma.disponivel %}onclick="return false;"{% endif %}>
                        <span class="hotspot-label">
                            {% if bioma.disponivel %}
                            <i class="fas fa-headphones"></i> Explore
                            {% else %}
                            <i class="fas fa-clock"></i> Coming soon
                            {% endif %}
                        </span>
                    </a>
                    {% endfor %}
                </div>
            </div>
        </div>

        <!-- Signature -->
        <p class="map-tagline">Discover Brazil's wild regions and birds with BBE</p>

    </div>

    <script>
        // Smooth page transition on biome click
        document.querySelectorAll('.map-hotspot:not(.disabled)').forEach(link => {
            link.addEventListener('click', function(e) {
                e.preventDefault();
                const href = this.getAttribute('href');
                document.querySelector('.map-page').classList.add('navigating');
                setTimeout(() => { window.location.href = href; }, 450);
            });
        });
    </script>
</body>
</html>
