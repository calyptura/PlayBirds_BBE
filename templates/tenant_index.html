<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlayBirds - Projetos</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=Fraunces:opsz,wght@9..144,400;9..144,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/design-system.css') }}">

    <style>
        .tenant-index {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: var(--space-2xl) var(--space-lg);
        }

        .tenant-index-header {
            text-align: center;
            margin-bottom: var(--space-2xl);
        }

        .tenant-index-header h1 {
            font-family: 'Fraunces', serif;
            font-size: 2rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: var(--space-sm);
        }

        .tenant-index-header h1 span {
            color: var(--accent-primary);
        }

        .tenant-index-header p {
            color: var(--text-secondary);
            font-size: 1rem;
        }

        .tenant-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: var(--space-lg);
            width: 100%;
            max-width: 1000px;
        }

        .tenant-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            overflow: hidden;
            transition: all var(--transition-base);
            text-decoration: none;
            color: inherit;
            animation: fadeInUp 0.4s var(--ease-out) backwards;
        }

        .tenant-card:hover {
            border-color: var(--border-hover);
            box-shadow: var(--shadow-card-hover);
            transform: translateY(-4px);
        }

        .tenant-card-cover {
            height: 160px;
            background: var(--gradient-surface);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .tenant-card-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .tenant-card-cover .placeholder-icon {
            font-size: 3rem;
            color: var(--text-muted);
        }

        .tenant-card-body {
            padding: var(--space-lg);
        }

        .tenant-card-body h2 {
            font-family: 'Fraunces', serif;
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: var(--space-xs);
        }

        .tenant-card-body p {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .tenant-card-footer {
            padding: var(--space-sm) var(--space-lg) var(--space-lg);
            display: flex;
            align-items: center;
            gap: var(--space-sm);
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .admin-link {
            position: fixed;
            bottom: var(--space-lg);
            right: var(--space-lg);
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 10px 20px;
            border-radius: var(--radius-full);
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.85rem;
            transition: all var(--transition-base);
        }

        .admin-link:hover {
            background: var(--bg-card-hover);
            color: var(--text-primary);
            border-color: var(--border-hover);
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="tenant-index">
        <header class="tenant-index-header">
            <h1><span>PlayBirds</span></h1>
            <p>Selecione um projeto para explorar</p>
        </header>

        <div class="tenant-grid">
            {% for tenant in tenants %}
            <a href="/{{ tenant.slug }}" class="tenant-card" style="animation-delay: {{ loop.index0 * 0.1 }}s;">
                <div class="tenant-card-cover" {% if tenant.theme and tenant.theme.primaryColor %}style="background: linear-gradient(135deg, {{ tenant.theme.primaryColor }}44 0%, {{ tenant.theme.primaryColor }}11 100%);"{% endif %}>
                    {% if tenant.coverImage %}
                    <img src="/{{ tenant.slug }}/tenant-image/{{ tenant.coverImage }}" alt="{{ tenant.name }}">
                    {% else %}
                    <i class="fas fa-feather-alt placeholder-icon"></i>
                    {% endif %}
                </div>
                <div class="tenant-card-body">
                    <h2>{{ tenant.name }}</h2>
                    {% if tenant.subtitle %}
                    <p>{{ tenant.subtitle }}</p>
                    {% endif %}
                </div>
                <div class="tenant-card-footer">
                    <i class="fas fa-arrow-right"></i> Explorar
                </div>
            </a>
            {% endfor %}
        </div>

        <a href="/admin/tenants" class="admin-link">
            <i class="fas fa-cog"></i> Gerenciar Projetos
        </a>
    </div>
</body>
</html>
